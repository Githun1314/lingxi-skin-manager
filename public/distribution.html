<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>分发灵犀皮肤管理器</title>
  <style>
    body{margin:0;background:#f3f1f6;color:#28242f;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif}
    .page{max-width:880px;margin:auto;padding:54px 24px 80px}a{color:#7457e8;text-decoration:none}
    .hero{margin:28px 0 30px;padding:34px;border-radius:24px;background:linear-gradient(135deg,#171520,#30255f);color:#fff}
    .hero h1{font-size:34px;margin:0 0 12px}.hero p{opacity:.72;line-height:1.7}
    .card{background:#fff;border:1px solid #e7e3eb;border-radius:20px;padding:25px;margin-top:15px;box-shadow:0 15px 45px rgba(39,31,61,.07)}
    h2{font-size:19px;margin:0 0 15px}.steps{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
    .step{background:#f7f5f9;border-radius:14px;padding:16px}.step b{display:grid;place-items:center;width:27px;height:27px;border-radius:9px;background:#7457e8;color:#fff;margin-bottom:12px}
    .step strong,.step small{display:block}.step small,.note{color:#7f7885;margin-top:7px;line-height:1.6;font-size:12px}
    .path{font-family:Menlo,Consolas,monospace;background:#22202a;color:#eeeafd;border-radius:10px;padding:12px;font-size:12px}
    .warning{border-left:3px solid #d18b35;padding-left:13px}@media(max-width:650px){.steps{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="page">
    <a href="/">← 返回皮肤管理器</a>
    <section class="hero"><h1>把它分享给其他灵犀用户</h1><p>macOS 与 Windows 都提供独立分享包。对方不需要源码，只需要先安装官方 WPS 灵犀。</p></section>
    <section class="card">
      <h2>macOS</h2>
      <div class="steps"><div class="step"><b>1</b><strong>发送 ZIP</strong><small>发送对应的 macOS 分享包。</small></div><div class="step"><b>2</b><strong>拖入应用程序</strong><small>解压后拖入 Applications。</small></div><div class="step"><b>3</b><strong>首次右键打开</strong><small>未做苹果公证时需要确认一次。</small></div></div>
    </section>
    <section class="card">
      <h2>Windows</h2>
      <div class="steps"><div class="step"><b>1</b><strong>发送 EXE</strong><small>发送 Windows x64 单文件程序。</small></div><div class="step"><b>2</b><strong>双击启动</strong><small>无需安装 Node.js 或解压文件。</small></div><div class="step"><b>3</b><strong>应用皮肤</strong><small>连接官方 WPS 灵犀独立客户端。</small></div></div>
      <p class="note warning">Windows 版不会连接 WPS Office 内置灵犀插件；请先安装 WPS 灵犀独立客户端。</p>
    </section>
  </main>
</body>
</html>
