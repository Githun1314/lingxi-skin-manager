name: 功能或主题建议
description: 提议新的主题、角色动作或管理能力
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: idea
    attributes:
      label: 建议内容
      description: 请说明使用场景，以及它解决什么问题。
    validations:
      required: true
  - type: textarea
    id: reference
    attributes:
      label: 参考资料
      description: 如包含图片或 IP，请说明素材来源和授权情况。

