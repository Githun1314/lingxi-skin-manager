name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - ".github/workflows/windows-exe.yml"
      - "lib/**"
      - "public/**"
      - "scripts/build-windows-exe.mjs"
      - "server.mjs"
      - "package.json"
      - "package-lock.json"
  pull_request:
    paths:
      - ".github/workflows/windows-exe.yml"
      - "lib/**"
      - "public/**"
      - "scripts/build-windows-exe.mjs"
      - "server.mjs"
      - "package.json"
      - "package-lock.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "26.5.0"
          cache: npm
      - run: npm ci
      - run: npm run check
      - name: Build the single-file Windows application
        run: npm run build:windows:exe
      - name: Smoke-test the executable and embedded interface
        shell: powershell
        run: |
          $exe = Join-Path $PWD "dist\WPS-Lingxi-Skin-Manager-Windows-x64.exe"
          $stdout = Join-Path $env:RUNNER_TEMP "manager-stdout.log"
          $stderr = Join-Path $env:RUNNER_TEMP "manager-stderr.log"
          $statusFile = Join-Path $env:RUNNER_TEMP "manager-status.json"
          $pageFile = Join-Path $env:RUNNER_TEMP "manager-index.html"
          $process = Start-Process -FilePath $exe -ArgumentList "--background" -RedirectStandardOutput $stdout -RedirectStandardError $stderr -PassThru
          try {
            $ready = $false
            $ErrorActionPreference = "SilentlyContinue"
            for ($index = 0; $index -lt 80; $index++) {
              & curl.exe --fail --silent --show-error --output $statusFile "http://127.0.0.1:17363/api/status" 2>$null
              $statusExit = $LASTEXITCODE
              & curl.exe --fail --silent --show-error --output $pageFile "http://127.0.0.1:17363/" 2>$null
              $pageExit = $LASTEXITCODE
              if ($statusExit -eq 0 -and $pageExit -eq 0 -and (Get-Item $statusFile).Length -gt 20 -and (Get-Item $pageFile).Length -gt 1000) {
                $ready = $true
                break
              }
              if ($process.HasExited) { break }
              Start-Sleep -Milliseconds 250
            }
            $ErrorActionPreference = "Stop"
            if (-not $ready) {
              Write-Host "--- executable stdout ---"
              if (Test-Path $stdout) { Get-Content $stdout }
              Write-Host "--- executable stderr ---"
              if (Test-Path $stderr) { Get-Content $stderr }
              Write-Host "--- status response ---"
              if (Test-Path $statusFile) { Get-Content $statusFile }
              Write-Host "--- page bytes ---"
              if (Test-Path $pageFile) { (Get-Item $pageFile).Length }
              throw "The packaged manager did not serve its embedded interface."
            }
          } finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }
      - name: Hide the command window in the final executable
        run: node scripts/set-windows-gui-subsystem.mjs dist/WPS-Lingxi-Skin-Manager-Windows-x64.exe
      - name: Write SHA256 checksum
        shell: powershell
        run: |
          $exe = "dist\WPS-Lingxi-Skin-Manager-Windows-x64.exe"
          $hash = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLowerInvariant()
          "$hash  WPS-Lingxi-Skin-Manager-Windows-x64.exe" |
            Set-Content -Encoding ascii "dist\WPS-Lingxi-Skin-Manager-Windows-x64.exe.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: WPS-Lingxi-Skin-Manager-Windows-x64
          path: |
            dist/WPS-Lingxi-Skin-Manager-Windows-x64.exe
            dist/WPS-Lingxi-Skin-Manager-Windows-x64.exe.sha256
          if-no-files-found: error
